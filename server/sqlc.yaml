version: "2"
sql:
  - engine: "mysql"
    queries: "./db/query.sql"
    schema: "./db/schema.sql"
    gen:
      go:
        out: "./db/generated"
        package: "generated"
        emit_db_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_exact_table_names: true
