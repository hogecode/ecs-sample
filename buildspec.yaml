version: 0.2

# ========================================
# CodeBuild Buildspec - Docker Build & Push
# ========================================
# このファイルは ECS コンテナイメージをビルドし、ECR にプッシュします

phases:
  pre_build:
    commands:
      - echo "=========================================="
      - echo "Phase: Pre-Build - AWS ECR Login"
      - echo "=========================================="
      - echo "Logging in to ECR at $(date)"
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
      - echo "Repository URI: $REPOSITORY_URI"
      - echo "Image Tag: $IMAGE_TAG"

  build:
    commands:
      - echo "=========================================="
      - echo "Phase: Build - Docker Image Build"
      - echo "=========================================="
      - echo "Building Docker image on $(date)"
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG -t $REPOSITORY_URI:latest .
      - echo "Docker image built successfully"
      - docker images

  post_build:
    commands:
      - echo "=========================================="
      - echo "Phase: Post-Build - Push to ECR"
      - echo "=========================================="
      - echo "Pushing Docker image to ECR on $(date)"
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - docker push $REPOSITORY_URI:latest
      - echo "Docker image pushed successfully"
      - printf '[{"name":"ecs-sample-container","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json
      - cat imagedefinitions.json
      - echo "=========================================="
      - echo "Build completed successfully"
      - echo "=========================================="

artifacts:
  files:
    - imagedefinitions.json
  name: BuildArtifact

cache:
  paths:
    - '/root/.docker/**/*'

# ========================================
# Environment Variables (from CodeBuild Project)
# ========================================
# 環境変数はコードビルドプロジェクトで定義される
# - AWS_DEFAULT_REGION: ap-northeast-1
# - AWS_ACCOUNT_ID: 123456789012
# - IMAGE_REPO_NAME: ecs-sample
