version: 0

# ========================================
# AppSpec - ECS Fargate Deployment Configuration
# ========================================
# このファイルは CodeDeploy による ECS Fargate へのデプロイメント設定を定義します

Resources:
  - TargetService:
      Type: AWS::ECS::Service
      Properties:
        TaskDefinition: arn:aws:ecs:ap-northeast-1:ACCOUNT_ID:task-definition/ecs-sample:REVISION
        LoadBalancerInfo:
          ContainerName: ecs-sample-container
          ContainerPort: 8080
        PlatformVersion: 1.4.0
        NetworkConfiguration:
          AwsvpcConfiguration:
            Subnets:
              - PRIVATE_API_SUBNET_1
              - PRIVATE_API_SUBNET_2
            SecurityGroups:
              - GO_SERVER_SECURITY_GROUP
            AssignPublicIp: DISABLED

Hooks:
  - BeforeInstall: pre-install-hook
  - AfterInstall: post-install-hook
  - BeforeAllowTraffic: pre-traffic-hook
  - AfterAllowTraffic: post-traffic-hook

# ========================================
# Lifecycle Hooks
# ========================================
# TrafficControl: リニアモードで段階的にトラフィックを切り替え
# - Canary (本番): 10% → 5分待機 → 90%
# - AllAtOnce (ステージング): すべてのトラフィックを即座に切り替え

# Hooks の動作:
# 1. BeforeInstall: 新タスクをスピンアップする前に実行
#    用途: バックアップ、スナップショット作成
#
# 2. AfterInstall: 新タスクがスピンアップした後に実行
#    用途: ヘルスチェック、ウォームアップ
#
# 3. BeforeAllowTraffic: トラフィック切り替え前に実行
#    用途: スモークテスト、統合テスト
#
# 4. AfterAllowTraffic: トラフィック切り替え後に実行
#    用途: メトリクス検証、ログ検査

# ========================================
# 注意事項
# ========================================
# - このファイルのプレースホルダー（ACCOUNT_ID, REVISION など）は、
#   CodePipeline の buildspec.yaml で imagedefinitions.json として生成されたタスク定義リビジョンで置き換えられます
#
# - ECS デプロイモデルの設定はコンソール/Terraform で設定：
#   * DeploymentConfiguration.MaximumPercent: 本番=200%, ステージング=200%
#   * DeploymentConfiguration.MinimumHealthyPercent: 本番=100%, ステージング=100%
#   * DeploymentCircuitBreaker: 有効（自動ロールバック）
#   * EnableECSManagedTags: true